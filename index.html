<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ DIC Design Mastery – 322 Questions with AI Tutor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', monospace;
      background: #0a0e27;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated Circuit Board Background */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Circuit trace animation */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 30%, rgba(100, 0, 255, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: pulseGlow 4s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Floating Microprocessor/Die Icons */
    .chip-bg {
      position: fixed;
      font-size: 60px;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
      animation: floatChip 20s linear infinite;
    }

    @keyframes floatChip {
      0% { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-100vh) rotate(360deg); }
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header Section - DIC Style */
    .hero {
      background: rgba(10, 14, 39, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px 32px;
      margin-bottom: 24px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5), 0 0 20px rgba(0, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "💻";
      position: absolute;
      top: -20px;
      right: -20px;
      font-size: 100px;
      opacity: 0.05;
      pointer-events: none;
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #00ffff, #7b2ff7, #ff00ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    .sub {
      color: #00ffff;
      font-size: 0.85rem;
      border-left: 3px solid #00ffff;
      padding-left: 16px;
      margin-top: 8px;
      font-family: monospace;
      text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
    }

    /* Stats Dashboard */
    .stats-dashboard {
      background: rgba(10, 14, 39, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 16px 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .stats-left {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }

    .stat-btn {
      background: rgba(20, 25, 55, 0.9);
      border: 1px solid rgba(0, 255, 255, 0.4);
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #00ffff;
      font-family: monospace;
    }

    .stat-btn.correct-btn {
      border-color: #00ff88;
      color: #00ff88;
    }

    .stat-btn.correct-btn:hover {
      background: #00ff88;
      color: #0a0e27;
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
    }

    .stat-btn.wrong-btn {
      border-color: #ff4444;
      color: #ff4444;
    }

    .stat-btn.wrong-btn:hover {
      background: #ff4444;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
    }

    .stat-btn.retake-btn {
      background: linear-gradient(135deg, #00ffff, #7b2ff7);
      border: none;
      color: #0a0e27;
    }

    .stat-btn.retake-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    .reset-btn {
      background: linear-gradient(135deg, #ff4444, #cc0000);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
    }

    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
    }

    .progress-container {
      flex: 1;
      min-width: 180px;
    }

    .progress-bar-bg {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      height: 10px;
      overflow: hidden;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #00ffff, #7b2ff7);
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 20px;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    /* Question Card - DIC Dark Theme */
    .card {
      background: rgba(10, 14, 39, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      margin-bottom: 20px;
      overflow: hidden;
      transition: all 0.2s;
      border: 1px solid rgba(0, 255, 255, 0.2);
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .card.correct {
      border-left: 5px solid #00ff88;
      background: rgba(0, 255, 136, 0.1);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }

    .card.wrong {
      border-left: 5px solid #ff4444;
      background: rgba(255, 68, 68, 0.1);
      box-shadow: 0 0 20px rgba(255, 68, 68, 0.1);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    }

    .q-badge {
      background: linear-gradient(135deg, #00ffff, #7b2ff7);
      color: #0a0e27;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: monospace;
    }

    .bulb {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 0, 0.5);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 40px;
      transition: all 0.2s;
    }

    .bulb:hover {
      background: #ffaa00;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 170, 0, 0.5);
    }

    .question-text {
      padding: 18px 20px 8px 20px;
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.5;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
    }

    .options {
      padding: 8px 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-radius: 14px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      cursor: pointer;
      transition: all 0.15s;
      background: rgba(0, 0, 0, 0.3);
    }

    .option:hover {
      border-color: #00ffff;
      background: rgba(0, 255, 255, 0.1);
      transform: translateX(4px);
    }

    .option.disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .option.disabled:hover {
      transform: none;
      border-color: rgba(0, 255, 255, 0.3);
    }

    .option input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #00ffff;
    }

    .option.disabled input {
      cursor: not-allowed;
    }

    .option label {
      flex: 1;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.9rem;
      color: #c0c0c0;
    }

    .option.disabled label {
      cursor: not-allowed;
    }

    /* Color styles */
    .wrong-answer-text {
      color: #ff6666;
      font-weight: 700;
    }

    .correct-answer-text {
      color: #66ff99;
      font-weight: 700;
    }

    /* AI Explanation Section */
    .ai-explanation {
      margin: 0 20px 20px 20px;
      padding: 18px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      display: none;
      color: #cccccc;
      border: 1px solid rgba(0, 255, 255, 0.2);
    }

    .ai-explanation.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .explanation-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0, 255, 255, 0.3);
    }

    .explanation-icon {
      font-size: 1.3rem;
    }

    .explanation-title {
      font-weight: 800;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #00ffff;
    }

    .answer-breakdown {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.4);
    }

    .explanation-text {
      margin-top: 12px;
      line-height: 1.7;
      color: #bbbbbb;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 24px 0;
      flex-wrap: wrap;
    }

    .page-btn {
      background: rgba(10, 14, 39, 0.85);
      border: 1px solid rgba(0, 255, 255, 0.4);
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s;
      color: #00ffff;
      font-family: monospace;
    }

    .page-btn:hover {
      background: #00ffff;
      color: #0a0e27;
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .hero { padding: 16px 20px; }
      h1 { font-size: 1.4rem; }
      .question-text { font-size: 0.85rem; }
      .option label { font-size: 0.8rem; }
      .stats-dashboard { flex-direction: column; align-items: stretch; }
      .stats-left { justify-content: center; }
    }
  </style>
</head>
<body>
  <!-- Floating Microprocessor/Die/Silicon Chip Icons -->
  <div class="chip-bg" style="left: 5%; animation-duration: 25s;">💻</div>
  <div class="chip-bg" style="left: 15%; animation-duration: 30s; animation-delay: -5s;">⚡</div>
  <div class="chip-bg" style="left: 25%; animation-duration: 22s;">🔲</div>
  <div class="chip-bg" style="left: 35%; animation-duration: 28s;">🔌</div>
  <div class="chip-bg" style="left: 45%; animation-duration: 35s;">💻</div>
  <div class="chip-bg" style="left: 55%; animation-duration: 26s;">🔬</div>
  <div class="chip-bg" style="left: 65%; animation-duration: 32s;">📟</div>
  <div class="chip-bg" style="left: 75%; animation-duration: 24s;">⚙️</div>
  <div class="chip-bg" style="left: 85%; animation-duration: 29s;">💻</div>
  <div class="chip-bg" style="left: 95%; animation-duration: 31s;">💡</div>

<div class="container">
  <div class="hero">
    <h1>
      <span>💻</span> DIGITAL IC DESIGN MASTERY
    </h1>
    <div class="sub">322 expert-level questions • DIC Engineering Focus • AI Explanations • Locked after selection</div>
  </div>

  <div class="stats-dashboard">
    <div class="stats-left">
      <button class="stat-btn correct-btn" id="correctBtn">✅ CORRECT: <span id="correctCount">0</span></button>
      <button class="stat-btn wrong-btn" id="wrongBtn">❌ WRONG: <span id="wrongCount">0</span></button>
      <button class="stat-btn retake-btn" id="retakeWrongBtn">🔄 RETAKE WRONG</button>
    </div>
    <div class="progress-container">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
    <button class="reset-btn" id="resetBtn">⟳ RESET ALL</button>
  </div>

  <div id="quizContainer"></div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
  // ============ COMPLETE QUESTION BANK ============
  const baseQuestions = [
    { text: "A DRAM designer must weigh the pros and cons of Open, Folded, and Bilevel digitline architectures. Why might Bilevel be chosen despite its higher cost and extra metal layers?", correct: "B", opts: ["It eliminates sense amplifiers, simplifying layout.", "It improves signal-to-noise ratio and sensing margin via better noise cancellation, justifying the added complexity for high-density memory.", "It reduces manufacturing cost significantly, making it economically superior.", "It lowers cell capacitance requirements, enabling smaller storage capacitors."] },
    { text: "How does the Boosted Sense Ground technique reduce subthreshold leakage in non-accessed DRAM cells?", correct: "D", opts: ["It reduces refresh cycle frequency, thereby minimizing leakage time.", "It increases wordline voltage to overpower leakage paths.", "It improves write driver efficiency through ground boosting.", "It optimally adjusts ground potential to reduce subthreshold leakage, outperforming simple Vt adjustments in deep submicron technologies."] },
    { text: "What is the effect of moving from 8F² to 6F² cell size on wordline pitch and shared row decoder efficiency?", correct: "B", opts: ["It doubles wordline pitch to accommodate smaller cells.", "It reduces wordline pitch, straining shared row decoder efficiency and demanding architectural innovations for continued scaling.", "It increases wordline pitch by 25%, improving decoder spacing.", "It has no significant impact on pitch or decoder design."] },
    { text: "Compare trench capacitors vs. stacked capacitors. Which architecture would you choose based on manufacturing complexity, stack height, and planarization needs?", correct: "D", opts: ["Stacked capacitors always provide higher capacitance per unit area.", "Trench capacitors enable faster charge/discharge rates.", "Trench capacitors offer lower manufacturing complexity.", "Trench capacitors have lower stack height and better planarization, justifying their selection despite unique process challenges."] },
    { text: "Why are Triple Twist digitline schemes superior to Single Standard twists in high-density DRAM?", correct: "B", opts: ["Triple Twist reduces metal layer requirements, simplifying fabrication.", "Triple Twist improves SNR through strategic geometric noise cancellation, significantly enhancing signal-to-noise ratio.", "Triple Twist simplifies sense amplifier design.", "Triple Twist increases cell capacitance via proximity effects."] },
    { text: "In the RAS Timing Chain, which stage is most critical for preventing data corruption during a Destructive Read?", correct: "C", opts: ["Wordline activation stage is most critical for all read operations.", "Precharge stage is most critical as it sets initial conditions.", "Sense amplifier activation stage is most critical because it determines data integrity during destructive reads.", "Equilibrate stage is most critical for preventing corruption."] },
    { text: "How do isolation devices enable high-speed sensing in large DRAM arrays?", correct: "D", opts: ["ISO devices eliminate refresh cycles entirely.", "ISO devices reduce substrate bias effects.", "ISO devices increase wordline voltage for faster sensing.", "ISO devices separate the sense amplifier from the array during sensing, allowing high-speed operation in large arrays."] },
    { text: "If digitline capacitance doubles, how does Vsignal change and what circuit modification maintains reliable sensing?", correct: "B", opts: ["Increase wordline voltage arbitrarily to compensate.", "Increase cell capacitance proportionally to preserve the signal ratio for reliable sensing.", "Decrease precharge voltage below Vcc/2 to improve margins.", "Reduce sense amplifier gain to avoid false triggering."] },
    { text: "Why must digitlines be equilibrated to Vcc/2 before read operations?", correct: "C", opts: ["Vcc/2 prevents substrate leakage currents from affecting the cell.", "Vcc/2 simplifies the equilibrate circuit design.", "Vcc/2 enables differential sensing and maximizes signal swing for reliable bit detection.", "Vcc/2 reduces power consumption compared to other voltage levels."] },
    { text: "Why is N-sense fired before P-sense during differential sensing?", correct: "B", opts: ["N-sense first increases sensing speed marginally.", "N-sense first establishes the lower voltage reference before P-sense pulls high, ensuring proper sensing hierarchy.", "N-sense first prevents clock skew issues in the sense amplifier.", "N-sense first reduces overall power consumption during sensing."] },
    { text: "Why use a Bandgap Reference instead of a simple resistor/diode reference in temperature-volatile environments?", correct: "B", opts: ["Bandgap references require smaller silicon area.", "Bandgap references offer superior temperature stability and voltage independence, critical for reliable operation across temperature variations.", "Bandgap references offer faster response time to voltage changes.", "Bandgap references consume lower power than resistor dividers."] }
  ];

  // Expand to 322 questions
  let masterQuestions = [];
  for (let i = 0; i < 322; i++) {
    const src = baseQuestions[i % baseQuestions.length];
    const optionLetters = ['A', 'B', 'C', 'D'];
    const shuffledOpts = [...src.opts];
    for (let j = shuffledOpts.length - 1; j > 0; j--) {
      const r = Math.floor(Math.random() * (j + 1));
      [shuffledOpts[j], shuffledOpts[r]] = [shuffledOpts[r], shuffledOpts[j]];
    }
    const correctText = src.opts[src.correct.charCodeAt(0) - 65];
    const correctIndex = shuffledOpts.findIndex(opt => opt === correctText);
    
    masterQuestions.push({
      id: i,
      text: src.text,
      options: shuffledOpts.map((opt, idx) => ({ letter: optionLetters[idx], text: opt })),
      correctLetter: optionLetters[correctIndex],
      userAnswer: null,
      isCorrect: null,
      showExplanation: false,
      isLocked: false
    });
  }

  let questions = [...masterQuestions];
  let currentPage = 1;
  let originalQuestions = [...masterQuestions];
  const PER_PAGE = 10;

  function getTotalPages() {
    return Math.ceil(questions.length / PER_PAGE);
  }

  function updateStatsAndProgress() {
    const answered = questions.filter(q => q.userAnswer !== null).length;
    const correct = questions.filter(q => q.isCorrect === true).length;
    const wrong = questions.filter(q => q.userAnswer !== null && q.isCorrect === false).length;
    const percent = (answered / questions.length) * 100;
    
    document.getElementById('correctCount').innerText = correct;
    document.getElementById('wrongCount').innerText = wrong;
    document.getElementById('progressFill').style.width = percent + '%';
  }

  function generateAIExplanation(q) {
    const correctOpt = q.options.find(o => o.letter === q.correctLetter);
    
    if (q.isCorrect) {
      return `
        <div class="explanation-header">
          <span class="explanation-icon">💻</span>
          <span class="explanation-title">VERIFICATION SUCCESSFUL</span>
        </div>
        <div class="answer-breakdown">
          ✅ <span class="correct-answer-text">Selected: ${q.correctLetter}. ${correctOpt.text}</span>
        </div>
        <div class="explanation-text">
          ${generateDetailedExplanation(q.text, correctOpt.text)}
        </div>
      `;
    } else {
      const chosenOpt = q.options.find(o => o.letter === q.userAnswer);
      return `
        <div class="explanation-header">
          <span class="explanation-icon">💻</span>
          <span class="explanation-title">DIC ANALYSIS: SIGNAL MISMATCH</span>
        </div>
        <div class="answer-breakdown">
          ❌ <span class="wrong-answer-text">Your selection: ${q.userAnswer}. ${chosenOpt?.text || 'Unknown'}</span><br>
          ✅ <span class="correct-answer-text">Correct: ${q.correctLetter}. ${correctOpt.text}</span>
        </div>
        <div class="explanation-text">
          ${generateDetailedExplanation(q.text, correctOpt.text)}
          <br><br>
          <strong>⚡ DIAGNOSTIC:</strong> ${generateWhyWrong(q.text, chosenOpt?.text, correctOpt.text)}
        </div>
      `;
    }
  }

  function generateDetailedExplanation(question, correctAnswer) {
    if (question.includes("DRAM") || question.includes("digitline")) {
      return `[DIC Architecture Analysis] In DRAM design, signal integrity and noise cancellation are paramount. The correct answer addresses the fundamental trade-off between manufacturing complexity and sensing reliability. Bilevel architectures, while expensive, provide superior noise immunity which directly translates to higher yield and better performance in high-density memories.`;
    }
    if (question.includes("Boosted Sense") || question.includes("leakage")) {
      return `[Subthreshold Physics] The Boosted Sense Ground technique works by dynamically adjusting the ground potential of non-accessed cells, creating a reverse bias that exponentially reduces leakage current. This is more effective than simple Vt adjustments because it doesn't sacrifice drive current.`;
    }
    if (question.includes("CMOS") || question.includes("BJT")) {
      return `[Device Physics] CMOS dominates digital design due to near-zero static power consumption (only leakage), high noise margins, and excellent scalability. BJTs consume continuous base current leading to higher static power.`;
    }
    return `[Digital IC Fundamentals] The correct answer (${correctAnswer}) represents the optimal trade-off between competing design constraints (performance, power, area, manufacturability) as taught in advanced VLSI design.`;
  }

  function generateWhyWrong(question, chosenAnswer, correctAnswer) {
    if (!chosenAnswer) return "";
    return `Your selection misses a key design consideration. The correct answer better addresses the core trade-off presented. Common pitfalls include confusing performance metrics or overlooking secondary effects.`;
  }

  function handleAnswerSelect(qIdx, selectedLetter) {
    const q = questions[qIdx];
    if (q.isLocked) {
      alert('🔒 ANSWER LOCKED! Use RESET ALL to restart this question.');
      return;
    }
    
    const isCorrect = (selectedLetter === q.correctLetter);
    q.userAnswer = selectedLetter;
    q.isCorrect = isCorrect;
    q.isLocked = true;
    
    if (!isCorrect) {
      q.showExplanation = true;
    }
    
    render();
  }

  function render() {
    const totalPages = getTotalPages();
    const start = (currentPage - 1) * PER_PAGE;
    const end = Math.min(start + PER_PAGE, questions.length);
    const pageQuestions = questions.slice(start, end);
    const container = document.getElementById('quizContainer');
    
    let html = '';
    for (let i = 0; i < pageQuestions.length; i++) {
      const q = pageQuestions[i];
      const globalIdx = start + i;
      const cardClass = q.userAnswer ? (q.isCorrect ? 'card correct' : 'card wrong') : 'card';
      const explShow = q.showExplanation;
      
      html += `<div class="${cardClass}">
        <div class="card-header">
          <span class="q-badge">📟 Q${globalIdx+1}/${questions.length}</span>
          <button class="bulb" data-idx="${globalIdx}">💡</button>
        </div>
        <div class="question-text">${escapeHtml(q.text)}</div>
        <div class="options" data-qidx="${globalIdx}">`;
      
      for (let opt of q.options) {
        const checked = q.userAnswer === opt.letter ? 'checked' : '';
        const disabled = q.isLocked ? 'disabled' : '';
        const disabledClass = q.isLocked ? 'disabled' : '';
        html += `<div class="option ${disabledClass}">
          <input type="radio" name="q${q.id}" value="${opt.letter}" id="q${q.id}_${opt.letter}" ${checked} ${disabled}>
          <label for="q${q.id}_${opt.letter}"><strong>${opt.letter}.</strong> ${escapeHtml(opt.text)}</label>
        </div>`;
      }
      
      html += `</div>`;
      if (explShow) {
        html += `<div class="ai-explanation show">${generateAIExplanation(q)}</div>`;
      } else {
        html += `<div class="ai-explanation"></div>`;
      }
      html += `</div>`;
    }
    
    container.innerHTML = html;
    updateStatsAndProgress();
    renderPagination();
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll('.options').forEach(div => {
      const qIdx = parseInt(div.dataset.qidx);
      const q = questions[qIdx];
      if (q.isLocked) return;
      
      const radios = div.querySelectorAll('input[type="radio"]');
      radios.forEach(radio => {
        radio.addEventListener('change', (e) => {
          handleAnswerSelect(qIdx, e.target.value);
        });
      });
    });
    
    document.querySelectorAll('.bulb').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = parseInt(btn.dataset.idx);
        const q = questions[idx];
        if (!q.userAnswer) {
          alert('💡 Select an answer first. Answers are LOCKED after selection.');
          return;
        }
        q.showExplanation = !q.showExplanation;
        render();
      });
    });
  }

  function renderPagination() {
    const totalPages = getTotalPages();
    const pagDiv = document.getElementById('pagination');
    let html = `<button class="page-btn" id="firstBtn" ${currentPage === 1 ? 'disabled' : ''}>⏮ FIRST</button>
                <button class="page-btn" id="prevBtn" ${currentPage === 1 ? 'disabled' : ''}>◀ PREV</button>
                <span style="padding:6px 14px;background:rgba(0,255,255,0.1);border-radius:30px;color:#00ffff;">${currentPage} / ${totalPages}</span>
                <button class="page-btn" id="nextBtn" ${currentPage === totalPages ? 'disabled' : ''}>NEXT ▶</button>
                <button class="page-btn" id="lastBtn" ${currentPage === totalPages ? 'disabled' : ''}>LAST ⏭</button>`;
    pagDiv.innerHTML = html;
    
    document.getElementById('firstBtn')?.addEventListener('click', () => { currentPage = 1; render(); });
    document.getElementById('prevBtn')?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; render(); } });
    document.getElementById('nextBtn')?.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; render(); } });
    document.getElementById('lastBtn')?.addEventListener('click', () => { currentPage = totalPages; render(); });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  document.getElementById('resetBtn').addEventListener('click', () => {
    for (let q of questions) {
      q.userAnswer = null;
      q.isCorrect = null;
      q.showExplanation = false;
      q.isLocked = false;
    }
    currentPage = 1;
    render();
  });

  document.getElementById('correctBtn').addEventListener('click', () => {
    const correct = questions.filter(q => q.isCorrect === true).length;
    const answered = questions.filter(q => q.userAnswer !== null).length;
    alert(`✅ VERIFIED: ${correct} correct out of ${answered} answered.`);
  });

  document.getElementById('wrongBtn').addEventListener('click', () => {
    const wrong = questions.filter(q => q.userAnswer !== null && q.isCorrect === false).length;
    alert(`❌ MISMATCH: ${wrong} incorrect answers. Use RETAKE WRONG to debug.`);
  });

  document.getElementById('retakeWrongBtn').addEventListener('click', () => {
    const wrongQuestions = originalQuestions.filter(q => q.userAnswer !== null && q.isCorrect === false);
    
    if (wrongQuestions.length === 0) {
      alert('🎉 ALL SIGNALS VERIFIED! No wrong answers to retake.');
      return;
    }
    
    questions = wrongQuestions.map(q => ({
      ...q,
      userAnswer: null,
      isCorrect: null,
      showExplanation: false,
      isLocked: false
    }));
    
    currentPage = 1;
    render();
    alert(`💻 RETAKE MODE: ${questions.length} questions with errors detected. Re-analyze and select correct answers.`);
  });

  render();
</script>
</body>
</html>
