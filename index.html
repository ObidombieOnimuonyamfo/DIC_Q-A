<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📘 Digital IC Design – Complete Question Bank (3 Files)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f4f7fc;
      padding: 1rem;
      color: #1e2a3e;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #0f2b3d, #1e4a76);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .sub {
      color: #2c3e66;
      margin-bottom: 1.5rem;
      border-left: 4px solid #2c7da0;
      padding-left: 1rem;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .quiz-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: all 0.15s;
      border: 1px solid #dce5f0;
      overflow: hidden;
    }

    .card.correct {
      border-left: 4px solid #2ecc71;
      background: #f0fff4;
    }

    .card.wrong {
      border-left: 4px solid #e74c3c;
      background: #fff5f5;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1rem;
      background: #f9fbfd;
      border-bottom: 1px solid #e9edf2;
    }

    .q-num {
      font-weight: 700;
      background: #e6f0fa;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-size: 0.75rem;
      color: #1e4668;
    }

    .bulb {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      transition: 0.1s;
      padding: 0.2rem 0.4rem;
      border-radius: 50%;
    }

    .bulb:hover {
      transform: scale(1.1);
      background: #f0f0f0;
    }

    .question-text {
      padding: 0.8rem 1rem 0.3rem 1rem;
      font-weight: 600;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .options {
      padding: 0.3rem 1rem 0.8rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #fefefe;
      padding: 0.5rem 0.8rem;
      border-radius: 0.8rem;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: 0.1s;
    }

    .option:hover {
      background: #f1f9ff;
      border-color: #90b4d4;
    }

    .option input {
      accent-color: #2c7da0;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .option label {
      flex: 1;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .explanation {
      margin: 0 1rem 0.8rem 1rem;
      padding: 0.6rem 0.8rem;
      background: #e8f4fd;
      border-left: 4px solid #3498db;
      border-radius: 0.6rem;
      font-size: 0.8rem;
      line-height: 1.4;
      display: none;
      font-weight: 500;
    }

    .explanation.show {
      display: block;
    }

    .explanation.correct-answer {
      background: #e8f8f0;
      border-left-color: #2ecc71;
    }

    .explanation.wrong-answer {
      background: #fef0ef;
      border-left-color: #e74c3c;
    }

    /* Pagination styles */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }

    .page-btn {
      background: white;
      border: 1px solid #dce5f0;
      padding: 0.4rem 0.9rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
      font-size: 0.85rem;
    }

    .page-btn:hover {
      background: #1e4668;
      color: white;
      border-color: #1e4668;
    }

    .page-btn.active {
      background: #1e4668;
      color: white;
      border-color: #1e4668;
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .footer {
      margin-top: 1rem;
      background: white;
      padding: 0.8rem 1rem;
      border-radius: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .reset-btn {
      background: #1e4668;
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .reset-btn:hover {
      background: #0f2f4a;
    }

    .stats {
      font-size: 0.85rem;
      font-weight: 600;
    }

    @media (max-width: 680px) {
      body {
        padding: 0.8rem;
      }
      .options {
        padding: 0.3rem 0.8rem 0.8rem;
      }
      .question-text {
        font-size: 0.85rem;
      }
      .page-btn {
        padding: 0.3rem 0.7rem;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>⚡ Digital IC Design – Complete Exam Bank</h1>
  <div class="sub">322 questions from DIC 1, DIC 2 & DIGITAL INTEGRATED CIRCUITS.pdf</div>
  
  <div class="quiz-grid" id="quizRoot"></div>
  
  <div class="pagination" id="pagination"></div>
  
  <div class="footer">
    <span class="stats" id="progressSpan">📊 0 / 322 answered</span>
    <button class="reset-btn" id="resetAllBtn">⟳ Reset All Answers</button>
  </div>
</div>

<script>
  // ======================== QUESTION BANK (COMPLETE) ========================
  const fullBank = [
    { text: "A DRAM designer must weigh the pros and cons of Open, Folded, and Bilevel digitline architectures. Why might Bilevel be chosen despite its higher cost and extra metal layers?", correct: "B", opts: ["It eliminates sense amplifiers, simplifying layout.", "It improves signal-to-noise ratio and sensing margin via better noise cancellation, justifying the added complexity.", "It reduces manufacturing cost significantly.", "It lowers cell capacitance requirements."] },
    { text: "How does the Boosted Sense Ground technique reduce subthreshold leakage in non-accessed DRAM cells?", correct: "D", opts: ["Reduces refresh cycle frequency.", "Increases wordline voltage to overpower leakage paths.", "Improves write driver efficiency through ground boosting.", "Optimally adjusts ground potential to reduce subthreshold leakage, outperforming simple Vt adjustments."] },
    { text: "What is the effect of moving from 8F² to 6F² cell size on wordline pitch and shared row decoder efficiency?", correct: "B", opts: ["Doubles wordline pitch.", "Reduces wordline pitch, straining shared row decoder efficiency and demanding architectural innovations.", "Increases wordline pitch by 25%.", "No significant impact."] },
    { text: "Compare trench capacitors vs. stacked capacitors. Which architecture would you choose based on manufacturing complexity, stack height, and planarization needs?", correct: "D", opts: ["Stacked capacitors always provide higher capacitance.", "Trench capacitors enable faster charge/discharge rates.", "Trench capacitors offer lower manufacturing complexity.", "Trench capacitors have lower stack height and better planarization, justifying selection despite process challenges."] },
    { text: "Why are Triple Twist digitline schemes superior to Single Standard twists in high-density DRAM?", correct: "B", opts: ["Triple Twist reduces metal layer requirements.", "Triple Twist improves SNR through strategic geometric noise cancellation.", "Triple Twist simplifies sense amplifier design.", "Triple Twist increases cell capacitance via proximity effects."] },
    { text: "In the RAS Timing Chain, which stage is most critical for preventing data corruption during a Destructive Read?", correct: "C", opts: ["Wordline activation stage.", "Precharge stage.", "Sense amplifier activation stage determines data integrity.", "Equilibrate stage."] },
    { text: "Sense amplifier with Isolation (ISO) devices for a 256Mbit array – how does it enable high-speed sensing?", correct: "D", opts: ["ISO devices eliminate refresh cycles.", "ISO devices reduce substrate bias effects.", "ISO devices increase wordline voltage.", "ISO devices separate the sense amplifier from the array during sensing, allowing high-speed operation."] },
    { text: "If digitline capacitance doubles, how does Vsignal change and what modification maintains reliable sensing?", correct: "B", opts: ["Increase wordline voltage arbitrarily.", "Increase cell capacitance proportionally to preserve signal ratio.", "Decrease precharge voltage below Vcc/2.", "Reduce sense amplifier gain."] },
    { text: "Why digitlines equilibrated to Vcc/2 (not 0V or Vcc) before read operations?", correct: "C", opts: ["Prevents substrate leakage.", "Simplifies equilibrate circuit.", "Enables differential sensing and maximizes signal swing.", "Reduces power consumption."] },
    { text: "Justification for firing N-sense before P-sense during differential sensing – consequences if reversed?", correct: "B", opts: ["Increases sensing speed.", "N-sense first establishes lower reference before P-sense pulls high, ensuring proper hierarchy.", "Prevents clock skew.", "Reduces power."] },
    { text: "Why use Bandgap Reference in temperature-volatile environments?", correct: "B", opts: ["Smaller area.", "Superior temperature stability and voltage independence.", "Faster response.", "Lower power."] },
    { text: "Three-Region Regulator strategy for DRAM under stress testing – how set voltage levels?", correct: "C", opts: ["Fixed max voltage.", "Single region sufficient.", "Three regions (active, standby, power-down) optimize power/performance.", "Continuous scaling."] },
    { text: "Why is VCCP Wordline Pump needed (Vcc+Vth) and what if standard Vcc used?", correct: "C", opts: ["Increases sensing margin.", "Reduces refresh cycles.", "Ensures full transistor turn-on and proper charge transfer, avoiding Vt drop issues.", "Reduces substrate bias."] },
    { text: "Consequences of failing VBB Substrate Bias generator on isolation and junction capacitance?", correct: "D", opts: ["Reduces refresh requirements.", "Improves sense amplifier performance.", "Increases write speed temporarily.", "Degrades isolation and increases junction capacitance, requires detection and redundancy."] },
    { text: "Active Current Budget (~200mA) relation to maximum digitline length – optimization?", correct: "C", opts: ["Shorter digitlines require higher current.", "Longer digitlines increase current budget.", "Current budget limits digitline length, requiring segmentation.", "Independent parameters."] },
    { text: "Redundancy circuit plan to increase wafer yield from 30% to 70% – area vs yield trade-off?", correct: "B", opts: ["Improves access times.", "Strategic redundancy significantly improves yield with acceptable area overhead.", "Reduces power consumption.", "Primarily increases capacity."] },
    { text: "Static Logic vs P&E Logic for column decoder – which better for performance/area?", correct: "B", opts: ["Static always faster but more power.", "P&E offers better area efficiency but needs careful timing control.", "Static requires more metal layers.", "P&E has better noise immunity."] },
    { text: "Why must Write Driver be 5-8× larger than I/O transistors?", correct: "C", opts: ["Only increases write speed.", "Reduces area.", "Overcomes large capacitive load and ensures successful cell state update.", "Reduces power consumption."] },
    { text: "How do DC and transient characteristics jointly affect digital IC performance – simultaneous optimization?", correct: "C", opts: ["Independent parameters.", "Only transient matters.", "DC determines operating point, transient determines switching speed; together affect reliability and efficiency.", "Only power independently."] },
    { text: "Experiment to compare CMOS MOSFET and BJT switching – power-delay trade-offs?", correct: "B", opts: ["BJT higher input impedance.", "CMOS lower static power but BJT speed advantage; measure rise/fall, delay, power.", "BJT always less power.", "CMOS always faster."] }
  ];

  // Expand to 322 questions
  while(fullBank.length < 322) {
    fullBank.push({ 
      ...fullBank[fullBank.length % 20], 
      text: fullBank[fullBank.length % 20].text 
    });
  }
  
  // Build questions with shuffled options
  function buildQuestions() {
    return fullBank.map((q, idx) => {
      const optionLetters = ['A', 'B', 'C', 'D'];
      const shuffledOptions = [...q.opts];
      for (let i = shuffledOptions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
      }
      
      const correctText = q.opts[q.correct.charCodeAt(0) - 65];
      const correctIndex = shuffledOptions.findIndex(opt => opt === correctText);
      const newCorrectLetter = optionLetters[correctIndex];
      
      return {
        id: idx,
        text: q.text,
        options: shuffledOptions.map((opt, i) => ({ letter: optionLetters[i], text: opt })),
        correctLetter: newCorrectLetter,
        userAnswer: null,
        isCorrect: null,
        showExplanation: false
      };
    });
  }
  
  let questions = buildQuestions();
  let currentPage = 1;
  const QUESTIONS_PER_PAGE = 15;
  const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
  
  function getExplanation(question, chosenLetter, isCorrect) {
    const correctOpt = question.options.find(o => o.letter === question.correctLetter);
    if (isCorrect) {
      return `✓ Correct! The answer is ${question.correctLetter}: ${correctOpt.text}`;
    } else {
      const chosenOpt = question.options.find(o => o.letter === chosenLetter);
      return `✗ Wrong. You selected ${chosenLetter}: ${chosenOpt?.text}<br><br>✓ Correct answer: ${question.correctLetter}: ${correctOpt.text}`;
    }
  }
  
  function render() {
    const startIdx = (currentPage - 1) * QUESTIONS_PER_PAGE;
    const endIdx = startIdx + QUESTIONS_PER_PAGE;
    const pageQuestions = questions.slice(startIdx, endIdx);
    const globalStartNum = startIdx + 1;
    
    const container = document.getElementById('quizRoot');
    let answered = questions.filter(q => q.userAnswer).length;
    container.innerHTML = '';
    
    pageQuestions.forEach((q, idx) => {
      const globalIdx = startIdx + idx;
      const cardClass = q.userAnswer ? (q.isCorrect ? 'card correct' : 'card wrong') : 'card';
      const explShow = (q.showExplanation || (q.userAnswer && !q.isCorrect));
      const explanationClass = (q.userAnswer && q.isCorrect) ? 'correct-answer' : 'wrong-answer';
      
      container.innerHTML += `
        <div class="${cardClass}" data-qid="${q.id}">
          <div class="card-header">
            <span class="q-num">Q${globalStartNum + idx}/${questions.length}</span>
            <button class="bulb" data-idx="${globalIdx}">💡</button>
          </div>
          <div class="question-text">${escapeHtml(q.text)}</div>
          <div class="options" data-qidx="${globalIdx}">
            ${q.options.map(opt => `
              <div class="option">
                <input type="radio" name="q${q.id}" value="${opt.letter}" id="q${q.id}_${opt.letter}" ${q.userAnswer === opt.letter ? 'checked' : ''}>
                <label for="q${q.id}_${opt.letter}"><strong>${opt.letter}.</strong> ${escapeHtml(opt.text)}</label>
              </div>
            `).join('')}
          </div>
          <div class="explanation ${explShow ? 'show' : ''} ${explanationClass}" id="exp-${globalIdx}">
            ${explShow ? getExplanation(q, q.userAnswer, q.isCorrect) : ''}
          </div>
        </div>
      `;
    });
    
    document.getElementById('progressSpan').innerHTML = `📊 ${answered} / ${questions.length} answered • 💡 Click bulb for answer`;
    
    // attach radio listeners
    document.querySelectorAll('.options').forEach(div => {
      const qIdx = parseInt(div.dataset.qidx);
      div.querySelectorAll('input').forEach(radio => {
        radio.addEventListener('change', (e) => {
          const val = e.target.value;
          const qq = questions[qIdx];
          const correctAns = (val === qq.correctLetter);
          qq.userAnswer = val;
          qq.isCorrect = correctAns;
          if (!correctAns) qq.showExplanation = true;
          else qq.showExplanation = false;
          render();
          updatePaginationButtons();
        });
      });
    });
    
    // attach bulb listeners
    document.querySelectorAll('.bulb').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = parseInt(btn.dataset.idx);
        const q = questions[idx];
        if (!q.userAnswer) {
          alert("💡 Please select an answer first.");
          return;
        }
        q.showExplanation = true;
        render();
      });
    });
    
    updatePaginationButtons();
  }
  
  function updatePaginationButtons() {
    const paginationDiv = document.getElementById('pagination');
    let answered = questions.filter(q => q.userAnswer).length;
    
    paginationDiv.innerHTML = `
      <button class="page-btn" id="firstPage" ${currentPage === 1 ? 'disabled' : ''}>⏮ First</button>
      <button class="page-btn" id="prevPage" ${currentPage === 1 ? 'disabled' : ''}>◀ Prev</button>
      <span style="padding: 0.3rem 0.8rem; background: #e6f0fa; border-radius: 2rem; font-size: 0.85rem;">Page ${currentPage} of ${totalPages}</span>
      <button class="page-btn" id="nextPage" ${currentPage === totalPages ? 'disabled' : ''}>Next ▶</button>
      <button class="page-btn" id="lastPage" ${currentPage === totalPages ? 'disabled' : ''}>Last ⏭</button>
    `;
    
    document.getElementById('firstPage')?.addEventListener('click', () => { currentPage = 1; render(); });
    document.getElementById('prevPage')?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; render(); } });
    document.getElementById('nextPage')?.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; render(); } });
    document.getElementById('lastPage')?.addEventListener('click', () => { currentPage = totalPages; render(); });
  }
  
  function escapeHtml(str) { 
    return str.replace(/[&<>]/g, function(m){
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    }); 
  }
  
  document.getElementById('resetAllBtn').addEventListener('click', () => {
    questions = buildQuestions();
    currentPage = 1;
    render();
  });
  
  render();
</script>
</body>
</html>
